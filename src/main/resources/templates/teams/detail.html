<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${team.name} + ' - ' + #{app.name}">Team - Dugout</title>
</head>
<body>
    <div th:replace="~{layout/base :: *}">
        <div th:fragment="content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h2 th:text="${team.name}">Team Name</h2>
                    <span class="text-muted" th:text="${team.season}">2024-2025</span>
                </div>
                <div>
                    <a th:href="@{/teams/{id}/edit(id=${team.id})}" class="btn btn-outline-secondary btn-sm"
                       th:text="#{team.edit}">Edit</a>
                    <a th:href="@{/teams}" class="btn btn-outline-secondary btn-sm"
                       th:text="#{common.back}">Back</a>
                </div>
            </div>
            <hr>
            <p class="text-muted">Players, events, and attendance grid will appear here.</p>
        </div>
    </div>
</body>
</html>
