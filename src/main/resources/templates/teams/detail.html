<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${team.name} + ' - ' + #{app.name}">Team - Dugout</title>
</head>
<body>
    <div th:replace="~{layout/base :: *}">
        <div th:fragment="content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h2 th:text="${team.name}">Team Name</h2>
                    <span class="text-muted" th:text="${team.season}">2024-2025</span>
                </div>
                <div>
                    <a th:href="@{/teams/{id}/edit(id=${team.id})}" class="btn btn-outline-secondary btn-sm"
                       th:text="#{team.edit}">Edit</a>
                    <a th:href="@{/teams}" class="btn btn-outline-secondary btn-sm"
                       th:text="#{common.back}">Back</a>
                </div>
            </div>

            <!-- Attendance Grid -->
            <div th:if="${not #lists.isEmpty(grid.events) and not #lists.isEmpty(grid.playerRows)}" class="mb-4">
                <h4 th:text="#{attendance.save}">Attendance</h4>
                <form th:action="@{/teams/{id}/attendance(id=${team.id})}" method="post">
                    <div class="table-responsive">
                        <table class="table table-bordered table-sm text-center attendance-grid">
                            <thead>
                                <tr>
                                    <th class="text-start" style="min-width: 150px;">Player</th>
                                    <th th:each="event : ${grid.events}"
                                        th:classappend="${event.type.name() == 'TRAINING'} ? 'header-training' : 'header-match'"
                                        style="min-width: 45px; font-size: 0.8rem;">
                                        <div th:text="${#temporals.format(event.date, 'dd/MM')}">01/01</div>
                                        <small th:text="${event.type.name() == 'TRAINING'} ? 'T' : 'M'">T</small>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="row : ${grid.playerRows}">
                                    <td class="text-start fw-bold"
                                        th:text="${row.player.lastName} + ' ' + ${row.player.firstName}">Player Name</td>
                                    <td th:each="event : ${grid.events}"
                                        class="attendance-cell"
                                        th:classappend="${row.attendanceMap.containsKey(event.id) and row.attendanceMap.get(event.id)} ? 'cell-present' : 'cell-absent'"
                                        th:data-player="${row.player.id}"
                                        th:data-event="${event.id}"
                                        style="cursor: pointer;">
                                        <input type="hidden"
                                               th:name="'att_' + ${row.player.id} + '_' + ${event.id}"
                                               th:value="${row.attendanceMap.containsKey(event.id) and row.attendanceMap.get(event.id)} ? 'true' : 'false'">
                                        <span class="cell-label"
                                              th:text="${row.attendanceMap.containsKey(event.id) and row.attendanceMap.get(event.id)} ? 'P' : 'A'">A</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <button type="submit" class="btn text-white mt-2" style="background-color: var(--color-primary);"
                            th:text="#{attendance.save}">Save Attendance</button>
                </form>
            </div>

            <hr>

            <!-- Players Section -->
            <h4 th:text="#{team.players}">Players</h4>

            <form th:action="@{/teams/{id}/players/add(id=${team.id})}" method="post" class="row g-2 mb-3">
                <div class="col-auto">
                    <input type="text" class="form-control" name="firstName"
                           th:placeholder="#{player.firstName}" required>
                </div>
                <div class="col-auto">
                    <input type="text" class="form-control" name="lastName"
                           th:placeholder="#{player.lastName}" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn text-white" style="background-color: var(--color-secondary);"
                            th:text="#{player.add}">Add Player</button>
                </div>
            </form>

            <div th:if="${#lists.isEmpty(players)}" class="text-muted mb-3">
                No players yet.
            </div>

            <table th:unless="${#lists.isEmpty(players)}" class="table table-sm table-hover mb-4">
                <thead class="table-light">
                    <tr>
                        <th th:text="#{player.firstName}">First Name</th>
                        <th th:text="#{player.lastName}">Last Name</th>
                        <th th:text="#{common.actions}">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="player : ${players}">
                        <td th:text="${player.firstName}">John</td>
                        <td th:text="${player.lastName}">Doe</td>
                        <td>
                            <form th:action="@{/teams/{tid}/players/{pid}/remove(tid=${team.id}, pid=${player.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        th:text="#{player.remove}">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Events Section -->
            <h4 th:text="#{team.events}">Events</h4>

            <form th:action="@{/teams/{id}/events/add(id=${team.id})}" method="post" class="row g-2 mb-3">
                <div class="col-auto">
                    <select class="form-select" name="type" required>
                        <option value="TRAINING" th:text="#{event.type.training}">Training</option>
                        <option value="MATCH" th:text="#{event.type.match}">Match</option>
                    </select>
                </div>
                <div class="col-auto">
                    <input type="date" class="form-control" name="date" required>
                </div>
                <div class="col-auto">
                    <input type="text" class="form-control" name="notes"
                           th:placeholder="#{event.notes}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn text-white" style="background-color: var(--color-secondary);"
                            th:text="#{event.add}">Add Event</button>
                </div>
            </form>

            <div th:if="${#lists.isEmpty(events)}" class="text-muted mb-3">
                No events yet.
            </div>

            <table th:unless="${#lists.isEmpty(events)}" class="table table-sm table-hover">
                <thead class="table-light">
                    <tr>
                        <th th:text="#{event.type}">Type</th>
                        <th th:text="#{event.date}">Date</th>
                        <th th:text="#{event.notes}">Notes</th>
                        <th th:text="#{common.actions}">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event : ${events}">
                        <td>
                            <span th:if="${event.type.name() == 'TRAINING'}" class="badge"
                                  style="background-color: var(--color-training); color: var(--color-text);"
                                  th:text="#{event.type.training}">Training</span>
                            <span th:if="${event.type.name() == 'MATCH'}" class="badge"
                                  style="background-color: var(--color-match); color: var(--color-text);"
                                  th:text="#{event.type.match}">Match</span>
                        </td>
                        <td th:text="${event.date}">2024-01-15</td>
                        <td th:text="${event.notes}">-</td>
                        <td>
                            <form th:action="@{/teams/{tid}/events/{eid}/delete(tid=${team.id}, eid=${event.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
