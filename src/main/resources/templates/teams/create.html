<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{team.create} + ' - ' + #{app.name}">Create Team - Dugout</title>
</head>
<body>
    <div th:replace="~{layout/base :: *}">
        <div th:fragment="content">
            <h2 th:text="#{team.create}">Create Team</h2>
            <form th:action="@{/teams/create}" method="post" class="mt-3" style="max-width: 500px;">
                <div class="mb-3">
                    <label for="name" class="form-label" th:text="#{team.name}">Team Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="season" class="form-label" th:text="#{team.season}">Season</label>
                    <input type="text" class="form-control" id="season" name="season"
                           placeholder="2024-2025" required>
                </div>
                <button type="submit" class="btn text-white" style="background-color: var(--color-primary);"
                        th:text="#{common.save}">Save</button>
                <a th:href="@{/teams}" class="btn btn-outline-secondary" th:text="#{common.cancel}">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
