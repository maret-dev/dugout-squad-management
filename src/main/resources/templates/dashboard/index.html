<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.dashboard} + ' - ' + #{app.name}">Dashboard - Dugout</title>
</head>
<body>
    <div th:replace="~{layout/base :: *}">
        <div th:fragment="content">
            <h2 th:text="#{dashboard.welcome(${coachName})}">Welcome!</h2>
            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title" th:text="#{nav.teams}">Teams</h5>
                            <p class="card-text text-muted">Manage your teams, players, and attendance.</p>
                            <a th:href="@{/teams}" class="btn text-white" style="background-color: var(--color-primary);"
                               th:text="#{nav.teams}">Teams</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
