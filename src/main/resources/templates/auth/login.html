<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.login} + ' - ' + #{app.name}">Login - Dugout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center" style="min-height: 100vh; background-color: #f8f9fa;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4" style="color: var(--color-primary);"
                            th:text="#{app.name}">Dugout</h3>

                        <div th:if="${param.error}" class="alert alert-danger" role="alert">
                            <span th:text="#{auth.loginError}">Invalid username or password.</span>
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success" role="alert">
                            <span th:text="#{auth.logoutSuccess}">You have been logged out.</span>
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label" th:text="#{auth.username}">Username</label>
                                <input type="text" class="form-control" id="username" name="username"
                                       autofocus required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label" th:text="#{auth.password}">Password</label>
                                <input type="password" class="form-control" id="password" name="password"
                                       required>
                            </div>
                            <button type="submit" class="btn w-100 text-white"
                                    style="background-color: var(--color-primary);"
                                    th:text="#{auth.login}">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
