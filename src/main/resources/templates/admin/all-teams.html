<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.allTeams} + ' - ' + #{app.name}">All Teams - Dugout</title>
</head>
<body>
    <div th:replace="~{layout/base :: *}">
        <div th:fragment="content">
            <h2 th:text="#{admin.allTeams}">All Teams</h2>
            <div class="table-responsive mt-3">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th th:text="#{team.name}">Team Name</th>
                            <th th:text="#{team.season}">Season</th>
                            <th>Coach</th>
                            <th th:text="#{common.actions}">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="team : ${teams}">
                            <td th:text="${team.name}">Team</td>
                            <td th:text="${team.season}">2024-2025</td>
                            <td th:text="${team.coach.fullName}">Coach Name</td>
                            <td>
                                <a th:href="@{/teams/{id}(id=${team.id})}" class="btn btn-sm btn-outline-primary">View</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
