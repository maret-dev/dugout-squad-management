<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.createCoach} + ' - ' + #{app.name}">Create Coach - Dugout</title>
</head>
<body>
    <div th:replace="~{layout/base :: layout(~{::content})}">
        <div th:fragment="content">
            <h2 th:text="#{admin.createCoach}">Create Coach Account</h2>
            <form th:action="@{/admin/coaches/create}" method="post" class="mt-3" style="max-width: 500px;">
                <div class="mb-3">
                    <label for="username" class="form-label" th:text="#{auth.username}">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label" th:text="#{auth.password}">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" name="fullName" required>
                </div>
                <div class="mb-3">
                    <label for="role" class="form-label">Role</label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="COACH">COACH</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <button type="submit" class="btn text-white" style="background-color: var(--color-primary);"
                        th:text="#{common.save}">Save</button>
                <a th:href="@{/admin/coaches}" class="btn btn-outline-secondary"
                   th:text="#{common.cancel}">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
