<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.dashboard} + ' - ' + #{app.name}">Admin - Dugout</title>
</head>
<body>
    <div th:replace="~{layout/base :: layout(~{::content})}">
        <div th:fragment="content">
            <h2 th:text="#{admin.dashboard}">Admin Dashboard</h2>
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card text-center">
                        <div class="card-body">
                            <h3 th:text="${coachCount}">0</h3>
                            <p class="text-muted" th:text="#{admin.coaches}">Coaches</p>
                            <a th:href="@{/admin/coaches}" class="btn btn-outline-primary btn-sm"
                               th:text="#{admin.coaches}">Manage</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center">
                        <div class="card-body">
                            <h3 th:text="${teamCount}">0</h3>
                            <p class="text-muted" th:text="#{admin.allTeams}">Teams</p>
                            <a th:href="@{/admin/teams}" class="btn btn-outline-primary btn-sm"
                               th:text="#{admin.allTeams}">View All</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
